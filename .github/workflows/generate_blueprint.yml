name: Generate Frisson Blueprint

on:
  # Run every Monday, Wednesday, Friday at 9am UTC
  schedule:
    - cron: '0 9 * * 1,3,5'

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      genre:
        description: 'Genre (leave blank for random)'
        required: false
        default: ''
      intensity:
        description: 'Intensity 1-10 (leave blank for random)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate blueprint
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GENRE: ${{ github.event.inputs.genre }}
          INTENSITY: ${{ github.event.inputs.intensity }}
        run: python scripts/generate_blueprint.py

      - name: Commit blueprint to repo
        run: |
          git config user.name "goosebumps-bot"
          git config user.email "bot@goosebumps-channel"
          git add queue/
          git diff --staged --quiet || git commit -m "Blueprint: $(ls queue/*.json | tail -1 | xargs basename)"
          git push
