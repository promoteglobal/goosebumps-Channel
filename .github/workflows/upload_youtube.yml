name: Create Video and Upload to YouTube

on:
  workflow_dispatch:
    inputs:
      mp3_filename:
        description: 'MP3 path e.g. blues/my-track.mp3'
        required: true

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-google-api

      - name: Install Python dependencies
        run: |
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            /usr/bin/ffmpeg
            /usr/bin/ffprobe
            /usr/share/fonts/truetype/dejavu
          key: ${{ runner.os }}-ffmpeg-dejavu-v1

      - name: Install FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Create video with FFmpeg
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/create_video.py "music/${{ github.event.inputs.mp3_filename }}"

      - name: Upload to YouTube
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: python scripts/upload_youtube.py --auto

      - name: Commit state files
        run: |
          git config user.name "goosebumps-bot"
          git config user.email "bot@goosebumps-channel"
          git add output/
          git diff --staged --quiet || git commit -m "Uploaded video"
          git pull --rebase origin main
          git push