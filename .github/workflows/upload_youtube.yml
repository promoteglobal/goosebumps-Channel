name: Create Video and Upload to YouTube

on:
  push:
    paths:
      - 'music/**.mp3'
  workflow_dispatch:
    inputs:
      mp3_filename:
        description: 'MP3 path e.g. blues/my-track.mp3'
        required: true

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Find MP3 file
        id: find_mp3
        run: |
          if [ -n "${{ github.event.inputs.mp3_filename }}" ]; then
            echo "mp3=music/${{ github.event.inputs.mp3_filename }}" >> $GITHUB_OUTPUT
          else
            # Use GitHub's built-in list of changed files from the push event
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep '\.mp3$' | head -1)
            if [ -z "$CHANGED" ]; then
              # Fallback: find the most recently modified MP3
              CHANGED=$(find music -name "*.mp3" -newer music/.gitkeep 2>/dev/null | head -1)
            fi
            if [ -z "$CHANGED" ]; then
              # Last resort: newest MP3 by modification time
              CHANGED=$(find music -name "*.mp3" -printf '%T@ %p\n' 2>/dev/null | sort -n | tail -1 | cut -d' ' -f2-)
            fi
            echo "mp3=$CHANGED" >> $GITHUB_OUTPUT
          fi

      - name: Create video with FFmpeg
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/create_video.py "${{ steps.find_mp3.outputs.mp3 }}"

      - name: Upload to YouTube
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: python scripts/upload_youtube.py --auto

      - name: Commit state files
        run: |
          git config user.name "goosebumps-bot"
          git config user.email "bot@goosebumps-channel"
          git add output/
          git diff --staged --quiet || git commit -m "Uploaded video"
          git pull --rebase origin main
          git push
